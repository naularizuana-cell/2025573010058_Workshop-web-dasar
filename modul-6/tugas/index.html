<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List Lengkap</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🌸 Todo List Imut 🌸</h1>

      <!-- INPUT -->
      <div class="input-group">
        <input type="text" id="taskInput" placeholder="Masukkan tugas..." />

        <select id="priority">
          <option value="Rendah">Rendah</option>

          <option value="Sedang">Sedang</option>

          <option value="Tinggi">Tinggi</option>
        </select>

        <button id="addBtn">Tambah</button>
      </div>

      <!-- FILTER -->
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Semua</button>

        <button class="filter-btn" data-filter="active">Aktif</button>

        <button class="filter-btn" data-filter="completed">Selesai</button>
      </div>

      <!-- COUNTER -->
      <p id="counter">0 tugas tersisa</p>

      <!-- LIST -->
      <ul id="taskList"></ul>

      <!-- DELETE COMPLETED -->
      <button id="deleteCompleted">Hapus Semua Selesai</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
