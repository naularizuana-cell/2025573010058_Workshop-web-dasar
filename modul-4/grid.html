<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,              initial-scale=1.0"
    />
    <title>CSS Grid</title>
    <link rel="stylesheet" href="grid.css" />
  </head>
  <body>
    <h1>Demo CSS Grid</h1>
    <!-- Grid 3 kolom sama rata -->
    <section class="grid-dasar">
      <div>Item 1</div>
      <div>Item 2</div>
      <div>Item 3</div>
      <div>Item 4</div>
      <div>Item 5</div>
      <div>Item 6</div>
    </section>
    <!-- Grid 12 kolom layout -->
    <section class="layout-halaman">
      <header class="l-header">Header</header>
      <nav class="l-sidebar">Sidebar</nav>
      <main class="l-konten">Konten Utama</main>
      <aside class="l-aside">Aside</aside>
      <footer class="l-footer">Footer</footer>
    </section>
    <!-- Grid responsif otomatis -->
    <section class="grid-auto">
      <div>A</div>
      <div>B</div>
      <div>C</div>
      <div>D</div>
      <div>E</div>
      <div>F</div>
      <div>G</div>
      <div>H</div>
    </section>
    <!-- Galeri dengan item spesial -->
    <section class="galeri">
      <div class="g-besar">Foto Utama</div>
      <div>Foto 2</div>
      <div>Foto 3</div>
      <div>Foto 4</div>
      <div class="g-lebar">Banner Panjang</div>
      <div>Foto 6</div>
    </section>
  </body>
</html>
