<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan 1 - Dashboard Grid</title>

    <link rel="stylesheet" href="latihan-1.css" />
  </head>

  <body>
    <div class="container">
      <header class="header">
        <h2>Dashboard Admin</h2>
      </header>

      <aside class="sidebar">
        <h3>Menu</h3>
        <ul>
          <li>Dashboard</li>
          <li>Data User</li>
          <li>Laporan</li>
          <li>Pengaturan</li>
        </ul>
      </aside>

      <main class="main">
        <!-- Statistik -->
        <section class="stats">
          <div class="card">User<br /><b>120</b></div>
          <div class="card">Produk<br /><b>85</b></div>
          <div class="card">Transaksi<br /><b>230</b></div>
          <div class="card">Pendapatan<br /><b>Rp 12JT</b></div>
        </section>

        <section class="content-bawah">
          <div class="tabel">
            <h3>Tabel Data</h3>
            <p>Area Tabel Placeholder</p>
          </div>

          <div class="grafik">
            <h3>Grafik</h3>
            <p>Area Grafik Placeholder</p>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
