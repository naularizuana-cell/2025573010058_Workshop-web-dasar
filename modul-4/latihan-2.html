<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan 2</title>
    <link rel="stylesheet" href="latihan-2.css" />
  </head>
  <body>
    <h1>Komponen Interaktif</h1>

    <!-- ================= ACCORDION ================= -->
    <section>
      <h2>FAQ</h2>

      <details>
        <summary>Apa itu HTML?</summary>
        <p>HTML adalah bahasa untuk membuat struktur halaman web.</p>
      </details>

      <details>
        <summary>Apa itu CSS?</summary>
        <p>CSS digunakan untuk mengatur tampilan halaman web.</p>
      </details>

      <details>
        <summary>Apa itu JavaScript?</summary>
        <p>JavaScript digunakan untuk membuat website lebih interaktif.</p>
      </details>
    </section>

    <!-- ================= IMAGE HOVER ================= -->
    <section>
      <h2>Image Hover Overlay</h2>

      <div class="grid">
        <div class="img-box" style="--title: &quot;Gambar 1&quot;">
          <img src="https://picsum.photos/300?1" />
        </div>
        <div class="img-box" style="--title: &quot;Gambar 2&quot;">
          <img src="https://picsum.photos/300?2" />
        </div>
        <div class="img-box" style="--title: &quot;Gambar 3&quot;">
          <img src="https://picsum.photos/300?3" />
        </div>
        <div class="img-box" style="--title: &quot;Gambar 4&quot;">
          <img src="https://picsum.photos/300?4" />
        </div>
      </div>
    </section>

    <!-- ================= PROGRESS BAR ================= -->
    <section>
      <h2>Progress Bar</h2>

      <div class="progress" style="--progress: 75%"></div>
      <div class="progress" style="--progress: 50%"></div>
      <div class="progress" style="--progress: 30%"></div>
    </section>
  </body>
</html>
