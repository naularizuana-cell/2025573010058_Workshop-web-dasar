<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Link dan Gambar</title>
  </head>
  <body>
    <h1>Belajar Link dan Gambar</h1>
    <!-- Link ke situs eksternal -->
    <p>
      Kunjungi
      <a
        href="https://developer.mozilla.org"
        target="_blank"
        rel="noopener noreferrer"
        >MDN Web Docs</a
      >
      untuk referensi HTML lengkap.
    </p>
    <!-- Link ke bagian di halaman yang sama -->
    <p><a href="#gambar">Langsung ke bagian gambar ↓</a></p>
    <!-- Link email -->
    <p>Hubungi kami: <a href="mailto:info@contoh.com">info@contoh.com</a></p>
    <!-- Link telepon -->
    <p>Telepon: <a href="tel:+6281234567890">+62 812-3456-7890</a></p>
    <hr />
    <!-- Gambar dari URL internet -->
    <h2 id="gambar">Contoh Gambar</h2>
    <img
      src="https://picsum.photos/400/200"
      alt="Gambar acak dari Picsum Photos"
      width="400"
      height="200"
    />
    <!-- Gambar yang juga merupakan link -->
    <p>
      <a href="https://picsum.photos" target="_blank" rel="noopener noreferrer">
        <img
          src="https://picsum.photos/200/100"
          alt="Klik untuk ke Picsum"
          width="200"
        />
      </a>
    </p>
  </body>
</html>
