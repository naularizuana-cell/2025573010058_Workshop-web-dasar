<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belajar CSS</title>
    <!-- External CSS: cara yang dianjurkan -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Inline CSS: hanya untuk demonstrasi -->
    <p style="color: red; font-weight: bold">Teks merah inline.</p>
    <h1>Judul Halaman</h1>
    <p class="intro">Paragraf pengantar dengan class intro.</p>
    <p>Paragraf biasa tanpa class.</p>
    <p id="khusus">Paragraf dengan ID khusus.</p>
    <nav>
      <a href="#">Beranda</a> <a href="#" class="aktif"> Tentang </a>
      <a href="#">Kontak</a>
    </nav>
    
    <section class="kartu">
      <h2>Judul Kartu</h2>
      <p>Isi paragraf pertama.</p>
      <p>Isi paragraf kedua.</p>
    </section>
    <input type="text" placeholder="Coba ketik..." />
  </body>
